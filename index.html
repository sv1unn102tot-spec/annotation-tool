<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>修正指示ツール</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f5f5f3; color: #1a1a1a; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ─── Toolbar ─── */
#toolbar {
  height: 52px;
  background: #fff;
  border-bottom: 1px solid #e5e5e3;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 8px;
  flex-shrink: 0;
  z-index: 100;
}
.tool-group { display: flex; align-items: center; gap: 4px; }
.tool-sep { width: 1px; height: 24px; background: #e5e5e3; margin: 0 4px; }
#app-title { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-right: 8px; white-space: nowrap; }

button {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 12px; border-radius: 6px;
  border: 1px solid #d5d5d3; background: #fff;
  font-size: 13px; color: #333; cursor: pointer;
  white-space: nowrap; transition: background .15s, border-color .15s;
}
button:hover { background: #f5f5f3; border-color: #b5b5b3; }
button:active { background: #eee; }
button.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
button.btn-primary { background: #2563eb; color: #fff; border-color: #2563eb; }
button.btn-primary:hover { background: #1d4ed8; }
button.btn-danger { background: #fff; color: #dc2626; border-color: #fca5a5; }
button.btn-danger:hover { background: #fef2f2; }
button svg { width: 15px; height: 15px; flex-shrink: 0; }

#zoom-label { font-size: 13px; color: #666; min-width: 42px; text-align: center; }
.tool-label { font-size: 12px; color: #888; padding: 0 4px; }

/* ─── Main Layout ─── */
#main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ─── Canvas Area ─── */
#canvas-wrap {
  flex: 1;
  overflow: auto;
  position: relative;
  background: #e8e8e6;
  display: flex;
  align-items: flex-start;
  justify-content: flex-start;
}
#canvas-inner {
  position: relative;
  display: inline-block;
  margin: 24px;
  box-shadow: 0 4px 24px rgba(0,0,0,.12);
  cursor: crosshair;
  user-select: none;
  border-radius: 4px;
  overflow: hidden;
}
#canvas-inner.drawing-rect { cursor: crosshair; }
#canvas-inner.mode-pointer { cursor: default; }

#main-image {
  display: block;
  max-width: none;
  transform-origin: top left;
}
#pin-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
#draw-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* ─── Pins ─── */
.pin {
  position: absolute;
  width: 28px; height: 28px;
  border-radius: 50% 50% 50% 0;
  transform: translate(-50%, -100%) rotate(-45deg);
  cursor: pointer;
  pointer-events: all;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
  transition: transform .15s;
  z-index: 10;
}
.pin:hover { transform: translate(-50%, -100%) rotate(-45deg) scale(1.15); }
.pin .pin-num {
  transform: rotate(45deg);
  font-size: 11px; font-weight: 700; color: #fff;
  line-height: 1;
}
.pin.status-todo   { background: #ef4444; }
.pin.status-doing  { background: #f59e0b; }
.pin.status-done   { background: #10b981; }
.pin.hidden { display: none; }
.pin.selected::after {
  content: '';
  position: absolute; inset: -4px;
  border-radius: 50% 50% 50% 0;
  border: 2px solid #fff;
  pointer-events: none;
}

/* ─── Drawing overlays ─── */
.draw-rect {
  position: absolute;
  border: 2.5px solid #ef4444;
  background: rgba(239,68,68,.08);
  pointer-events: none;
  border-radius: 2px;
}
.draw-arrow {
  position: absolute;
  pointer-events: none;
  overflow: visible;
}

/* ─── Upload Placeholder ─── */
#upload-placeholder {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; color: #888;
}
#upload-placeholder.hidden { display: none; }
#drop-zone {
  border: 2px dashed #ccc; border-radius: 12px;
  padding: 48px 64px; text-align: center; cursor: pointer;
  background: #fff; transition: border-color .2s;
}
#drop-zone:hover, #drop-zone.dragover { border-color: #2563eb; color: #2563eb; }
#drop-zone svg { width: 40px; height: 40px; margin-bottom: 12px; }
#drop-zone p { font-size: 15px; font-weight: 500; }
#drop-zone small { font-size: 13px; color: #aaa; }
#file-input { display: none; }

/* ─── Sidebar ─── */
#sidebar {
  width: 340px;
  flex-shrink: 0;
  background: #fff;
  border-left: 1px solid #e5e5e3;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#sidebar-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid #f0f0ee;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
#sidebar-header h2 { font-size: 14px; font-weight: 600; color: #333; }
#sidebar-header .count-badge {
  font-size: 12px; background: #f0f0ee; color: #666;
  padding: 2px 8px; border-radius: 99px;
}
#filter-bar {
  padding: 8px 12px;
  border-bottom: 1px solid #f0f0ee;
  display: flex; gap: 4px; flex-wrap: wrap; flex-shrink: 0;
}
.filter-btn {
  padding: 3px 10px; font-size: 12px; border-radius: 99px;
  border: 1px solid #e0e0de; background: #fff; color: #555;
  cursor: pointer; transition: all .15s;
}
.filter-btn:hover { border-color: #2563eb; color: #2563eb; }
.filter-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }
#comment-list { flex: 1; overflow-y: auto; padding: 8px; }

/* ─── Comment Cards ─── */
.comment-card {
  border: 1px solid #e8e8e6; border-radius: 10px;
  margin-bottom: 8px; overflow: hidden; cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
  background: #fff;
}
.comment-card:hover { border-color: #93c5fd; box-shadow: 0 2px 8px rgba(37,99,235,.08); }
.comment-card.selected { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
.comment-card.status-done { opacity: .65; }

.card-header {
  padding: 10px 12px 8px;
  display: flex; align-items: flex-start; gap: 8px;
  border-bottom: 1px solid #f5f5f3;
}
.card-pin {
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.card-pin.status-todo  { background: #ef4444; }
.card-pin.status-doing { background: #f59e0b; }
.card-pin.status-done  { background: #10b981; }

.card-meta { flex: 1; min-width: 0; }
.card-title { font-size: 13px; font-weight: 600; line-height: 1.4; word-break: break-all; }
.card-badges { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
.badge {
  font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 500;
}
.badge-high   { background: #fef2f2; color: #dc2626; }
.badge-mid    { background: #fff7ed; color: #d97706; }
.badge-low    { background: #f0fdf4; color: #16a34a; }
.badge-todo   { background: #fef2f2; color: #dc2626; }
.badge-doing  { background: #fffbeb; color: #d97706; }
.badge-done   { background: #f0fdf4; color: #16a34a; }
.badge-assign { background: #eff6ff; color: #2563eb; }

.card-body { padding: 8px 12px; }
.card-field { font-size: 12px; color: #555; margin-bottom: 4px; line-height: 1.5; }
.card-field-label { color: #999; font-size: 11px; }
.card-actions { display: flex; gap: 4px; padding: 6px 8px; border-top: 1px solid #f5f5f3; }
.card-actions button { font-size: 12px; padding: 4px 8px; flex: 1; }

/* ─── Edit Form (inline in sidebar) ─── */
#edit-panel {
  border-top: 1px solid #e5e5e3;
  padding: 12px;
  background: #fafaf8;
  flex-shrink: 0;
  display: none;
}
#edit-panel.open { display: block; }
#edit-panel h3 { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: #333; }
.form-row { margin-bottom: 8px; }
.form-row label { display: block; font-size: 12px; color: #666; margin-bottom: 3px; }
.form-row input, .form-row textarea, .form-row select {
  width: 100%; font-size: 13px; padding: 7px 9px;
  border: 1px solid #d5d5d3; border-radius: 6px;
  background: #fff; color: #1a1a1a;
  font-family: inherit;
  transition: border-color .15s;
}
.form-row input:focus, .form-row textarea:focus, .form-row select:focus {
  outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1);
}
.form-row textarea { resize: vertical; min-height: 64px; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.form-actions { display: flex; gap: 6px; margin-top: 10px; }
.form-actions button { flex: 1; }

/* ─── Modal ─── */
#modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.4); z-index: 1000;
  align-items: center; justify-content: center;
}
#modal-overlay.open { display: flex; }
#modal-box {
  background: #fff; border-radius: 12px; padding: 24px;
  width: 440px; max-width: 90vw;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
#modal-box h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
#modal-box .form-actions { margin-top: 16px; }

/* ─── Toast ─── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #1a1a1a; color: #fff; padding: 10px 20px;
  border-radius: 8px; font-size: 13px; z-index: 2000;
  opacity: 0; transition: opacity .25s; pointer-events: none;
}
#toast.show { opacity: 1; }

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d0d0ce; border-radius: 3px; }
</style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
  <span id="app-title">🖊 修正指示ツール</span>
  <div class="tool-sep"></div>

  <div class="tool-group">
    <button id="btn-upload" onclick="document.getElementById('file-input').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      画像を開く
    </button>
    <input type="file" id="file-input" accept="image/*">
  </div>

  <div class="tool-sep"></div>

  <div class="tool-group">
    <span class="tool-label">ツール</span>
    <button id="btn-pin" class="active" onclick="setTool('pin')" title="ピンを置く (P)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0112 2a8 8 0 018 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>
      ピン
    </button>
    <button id="btn-rect" onclick="setTool('rect')" title="囲み (R)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
      囲み
    </button>
    <button id="btn-pointer" onclick="setTool('pointer')" title="選択 (S)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4l7.07 17 2.51-7.39L21 11.07z"/></svg>
      選択
    </button>
  </div>

  <div class="tool-sep"></div>

  <div class="tool-group">
    <button onclick="zoom(-0.25)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <span id="zoom-label">100%</span>
    <button onclick="zoom(0.25)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <button onclick="zoom(0)" title="実際のサイズ">1:1</button>
    <button onclick="fitImage()" title="フィット">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
    </button>
  </div>

  <div class="tool-sep"></div>

  <div class="tool-group">
    <button onclick="toggleDone()" id="btn-hide-done">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      完了を非表示
    </button>
    <button onclick="exportJSON()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      JSONを保存
    </button>
    <button onclick="document.getElementById('import-input').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      JSONを開く
    </button>
    <input type="file" id="import-input" accept=".json" style="display:none">
    <button onclick="exportPNG()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      PNG書き出し
    </button>
  </div>
</div>

<!-- Main -->
<div id="main">
  <!-- Canvas -->
  <div id="canvas-wrap">
    <div id="upload-placeholder">
      <div id="drop-zone">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <p>画像をここにドロップ</p>
        <small>または クリックしてファイルを選択</small>
      </div>
    </div>
    <div id="canvas-inner" style="display:none;">
      <img id="main-image" src="" alt="annotation target">
      <div id="pin-layer"></div>
      <canvas id="draw-layer"></canvas>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>修正コメント一覧</h2>
      <span class="count-badge" id="count-badge">0 件</span>
    </div>
    <div id="filter-bar">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">すべて</button>
      <button class="filter-btn" data-filter="todo" onclick="setFilter('todo', this)">未対応</button>
      <button class="filter-btn" data-filter="doing" onclick="setFilter('doing', this)">対応中</button>
      <button class="filter-btn" data-filter="done" onclick="setFilter('done', this)">完了</button>
      <button class="filter-btn" data-filter="high" onclick="setFilter('high', this)">優先度：高</button>
    </div>
    <div id="comment-list"></div>
    <div id="edit-panel">
      <h3 id="edit-panel-title">コメントを編集</h3>
      <div class="form-row">
        <label>修正内容 <span style="color:#ef4444">*</span></label>
        <textarea id="f-content" rows="3" placeholder="どこをどう直してほしいか"></textarea>
      </div>
      <div class="form-row">
        <label>参考文言</label>
        <textarea id="f-reference" rows="2" placeholder="コピー案・参考テキストなど"></textarea>
      </div>
      <div class="form-row-2">
        <div class="form-row">
          <label>優先度</label>
          <select id="f-priority">
            <option value="high">高</option>
            <option value="mid" selected>中</option>
            <option value="low">低</option>
          </select>
        </div>
        <div class="form-row">
          <label>ステータス</label>
          <select id="f-status">
            <option value="todo" selected>未対応</option>
            <option value="doing">対応中</option>
            <option value="done">完了</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label>担当者</label>
        <input type="text" id="f-assignee" placeholder="例：田中さん">
      </div>
      <div class="form-actions">
        <button class="btn-primary" onclick="saveEdit()">保存</button>
        <button onclick="cancelEdit()">キャンセル</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ─── State ───────────────────────────────────────────────
let annotations = [];
let nextId = 1;
let selectedId = null;
let editingId = null;
let currentTool = 'pin';
let zoomLevel = 1;
let hideDone = false;
let currentFilter = 'all';
let imageNaturalW = 0, imageNaturalH = 0;
let imageDataURL = '';
let imageName = '';

// Drawing state
let drawStart = null;
let drawRect = null;
let isDrawing = false;

const STORAGE_KEY = 'annotation-tool-data';

// ─── DOM refs ─────────────────────────────────────────────
const canvasInner = document.getElementById('canvas-inner');
const mainImage   = document.getElementById('main-image');
const pinLayer    = document.getElementById('pin-layer');
const drawLayer   = document.getElementById('draw-layer');
const placeholder = document.getElementById('upload-placeholder');
const commentList = document.getElementById('comment-list');
const editPanel   = document.getElementById('edit-panel');
const countBadge  = document.getElementById('count-badge');

// ─── Init ─────────────────────────────────────────────────
loadFromStorage();

// File input
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadImage(e.target.files[0]);
});
document.getElementById('import-input').addEventListener('change', e => {
  if (e.target.files[0]) importJSON(e.target.files[0]);
});

// Drop zone
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('canvas-wrap').addEventListener('dragover', e => {
  e.preventDefault(); dropZone.classList.add('dragover');
});
document.getElementById('canvas-wrap').addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
document.getElementById('canvas-wrap').addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadImage(f);
  else if (f && f.name.endsWith('.json')) importJSON(f);
});

// Canvas click
canvasInner.addEventListener('mousedown', onCanvasMousedown);
canvasInner.addEventListener('mousemove', onCanvasMousemove);
canvasInner.addEventListener('mouseup', onCanvasMouseup);

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if (e.key === 'p' || e.key === 'P') setTool('pin');
  if (e.key === 'r' || e.key === 'R') setTool('rect');
  if (e.key === 's' || e.key === 'S') setTool('pointer');
  if (e.key === 'Escape') { cancelEdit(); selectAnnotation(null); }
  if (e.key === 'Delete' && selectedId !== null) deleteAnnotation(selectedId);
});

// ─── Image Loading ────────────────────────────────────────
function loadImage(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    imageDataURL = ev.target.result;
    imageName = file.name;
    mainImage.onload = () => {
      imageNaturalW = mainImage.naturalWidth;
      imageNaturalH = mainImage.naturalHeight;
      resizeDrawLayer();
      placeholder.classList.add('hidden');
      canvasInner.style.display = 'inline-block';
      fitImage();
      renderAll();
      saveToStorage();
    };
    mainImage.src = imageDataURL;
  };
  reader.readAsDataURL(file);
}

function resizeDrawLayer() {
  const w = imageNaturalW * zoomLevel;
  const h = imageNaturalH * zoomLevel;
  drawLayer.width  = w;
  drawLayer.height = h;
  drawLayer.style.width  = w + 'px';
  drawLayer.style.height = h + 'px';
  mainImage.style.width  = w + 'px';
  mainImage.style.height = h + 'px';
  pinLayer.style.width   = w + 'px';
  pinLayer.style.height  = h + 'px';
  canvasInner.style.width  = w + 'px';
  canvasInner.style.height = h + 'px';
  renderDrawings();
}

// ─── Zoom ─────────────────────────────────────────────────
function zoom(delta) {
  if (delta === 0) { zoomLevel = 1; }
  else { zoomLevel = Math.min(4, Math.max(0.25, zoomLevel + delta)); }
  document.getElementById('zoom-label').textContent = Math.round(zoomLevel * 100) + '%';
  resizeDrawLayer();
  renderPins();
}
function fitImage() {
  if (!imageNaturalW) return;
  const wrap = document.getElementById('canvas-wrap');
  const availW = wrap.clientWidth  - 48;
  const availH = wrap.clientHeight - 48;
  zoomLevel = Math.min(1, availW / imageNaturalW, availH / imageNaturalH);
  zoomLevel = Math.max(0.1, zoomLevel);
  document.getElementById('zoom-label').textContent = Math.round(zoomLevel * 100) + '%';
  resizeDrawLayer();
  renderPins();
}

// ─── Tool Selection ───────────────────────────────────────
function setTool(tool) {
  currentTool = tool;
  document.getElementById('btn-pin').classList.toggle('active', tool === 'pin');
  document.getElementById('btn-rect').classList.toggle('active', tool === 'rect');
  document.getElementById('btn-pointer').classList.toggle('active', tool === 'pointer');
  canvasInner.className = '';
  if (tool === 'pointer') canvasInner.classList.add('mode-pointer');
}

// ─── Canvas Mouse Events ──────────────────────────────────
function getImageCoords(e) {
  const rect = canvasInner.getBoundingClientRect();
  const x = (e.clientX - rect.left) / zoomLevel;
  const y = (e.clientY - rect.top)  / zoomLevel;
  return { x: x / imageNaturalW, y: y / imageNaturalH };
}
function getPixelCoords(e) {
  const rect = canvasInner.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function onCanvasMousedown(e) {
  if (e.target.closest('.pin')) return;
  if (currentTool === 'pin' && imageNaturalW) {
    const c = getImageCoords(e);
    if (c.x < 0 || c.x > 1 || c.y < 0 || c.y > 1) return;
    addAnnotation(c.x, c.y, 'pin');
  } else if (currentTool === 'rect' && imageNaturalW) {
    const p = getPixelCoords(e);
    drawStart = p; isDrawing = true;
    drawRect = document.createElement('div');
    drawRect.className = 'draw-rect';
    Object.assign(drawRect.style, { left: p.x + 'px', top: p.y + 'px', width: '0', height: '0' });
    canvasInner.appendChild(drawRect);
  }
}
function onCanvasMousemove(e) {
  if (!isDrawing || currentTool !== 'rect') return;
  const p = getPixelCoords(e);
  const x = Math.min(p.x, drawStart.x);
  const y = Math.min(p.y, drawStart.y);
  const w = Math.abs(p.x - drawStart.x);
  const h = Math.abs(p.y - drawStart.y);
  Object.assign(drawRect.style, { left: x + 'px', top: y + 'px', width: w + 'px', height: h + 'px' });
}
function onCanvasMouseup(e) {
  if (!isDrawing || currentTool !== 'rect') return;
  isDrawing = false;
  if (drawRect) {
    const r = drawRect.getBoundingClientRect();
    const cRect = canvasInner.getBoundingClientRect();
    const rx = (r.left - cRect.left) / zoomLevel / imageNaturalW;
    const ry = (r.top  - cRect.top)  / zoomLevel / imageNaturalH;
    const rw = r.width  / zoomLevel / imageNaturalW;
    const rh = r.height / zoomLevel / imageNaturalH;
    drawRect.remove(); drawRect = null;
    if (rw > 0.005 && rh > 0.005) {
      const cx = rx + rw / 2;
      const cy = ry;
      addAnnotation(cx, cy, 'rect', { rx, ry, rw, rh });
    }
  }
}

// ─── Annotations CRUD ─────────────────────────────────────
function addAnnotation(x, y, type = 'pin', shape = null) {
  const ann = {
    id: nextId++,
    number: getNextNumber(),
    x, y, type,
    shape,
    content: '',
    reference: '',
    priority: 'mid',
    status: 'todo',
    assignee: '',
    createdAt: new Date().toISOString()
  };
  annotations.push(ann);
  renderAll();
  selectAnnotation(ann.id);
  openEdit(ann.id, true);
  saveToStorage();
}
function getNextNumber() {
  const used = annotations.map(a => a.number);
  let n = 1;
  while (used.includes(n)) n++;
  return n;
}
function deleteAnnotation(id) {
  if (!confirm('このコメントを削除しますか？')) return;
  annotations = annotations.filter(a => a.id !== id);
  if (selectedId === id) { selectedId = null; }
  if (editingId === id) cancelEdit();
  renderAll(); saveToStorage();
  toast('コメントを削除しました');
}
function updateAnnotation(id, data) {
  const idx = annotations.findIndex(a => a.id === id);
  if (idx < 0) return;
  Object.assign(annotations[idx], data);
  renderAll(); saveToStorage();
}
function selectAnnotation(id) {
  selectedId = id;
  renderPins();
  renderSidebar();
  if (id !== null) {
    const card = document.querySelector(`.comment-card[data-id="${id}"]`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ─── Edit Panel ───────────────────────────────────────────
function openEdit(id, isNew = false) {
  const ann = annotations.find(a => a.id === id);
  if (!ann) return;
  editingId = id;
  document.getElementById('edit-panel-title').textContent = isNew ? `# ${ann.number} 新規コメント` : `# ${ann.number} コメントを編集`;
  document.getElementById('f-content').value   = ann.content;
  document.getElementById('f-reference').value = ann.reference;
  document.getElementById('f-priority').value  = ann.priority;
  document.getElementById('f-status').value    = ann.status;
  document.getElementById('f-assignee').value  = ann.assignee;
  editPanel.classList.add('open');
  document.getElementById('f-content').focus();
}
function saveEdit() {
  if (editingId === null) return;
  const content = document.getElementById('f-content').value.trim();
  if (!content) { alert('修正内容を入力してください'); return; }
  updateAnnotation(editingId, {
    content,
    reference: document.getElementById('f-reference').value.trim(),
    priority:  document.getElementById('f-priority').value,
    status:    document.getElementById('f-status').value,
    assignee:  document.getElementById('f-assignee').value.trim(),
  });
  editPanel.classList.remove('open');
  editingId = null;
  toast('保存しました');
}
function cancelEdit() {
  if (editingId !== null) {
    const ann = annotations.find(a => a.id === editingId);
    if (ann && ann.content === '') {
      deleteAnnotation(ann.id);
      editingId = null;
      editPanel.classList.remove('open');
      return;
    }
  }
  editPanel.classList.remove('open');
  editingId = null;
}

// ─── Render ───────────────────────────────────────────────
function renderAll() { renderPins(); renderSidebar(); renderDrawings(); }

function renderPins() {
  pinLayer.innerHTML = '';
  if (!imageNaturalW) return;
  annotations.forEach(ann => {
    const px = ann.x * imageNaturalW * zoomLevel;
    const py = ann.y * imageNaturalH * zoomLevel;
    const pin = document.createElement('div');
    pin.className = `pin status-${ann.status}${(hideDone && ann.status === 'done') ? ' hidden' : ''}${ann.id === selectedId ? ' selected' : ''}`;
    pin.style.left = px + 'px';
    pin.style.top  = py + 'px';
    pin.innerHTML  = `<span class="pin-num">${ann.number}</span>`;
    pin.dataset.id = ann.id;
    pin.addEventListener('click', e => {
      e.stopPropagation();
      selectAnnotation(ann.id);
    });
    pin.addEventListener('dblclick', e => {
      e.stopPropagation();
      selectAnnotation(ann.id);
      openEdit(ann.id);
    });
    pinLayer.appendChild(pin);
  });
}

function renderDrawings() {
  const ctx = drawLayer.getContext('2d');
  ctx.clearRect(0, 0, drawLayer.width, drawLayer.height);
  annotations.forEach(ann => {
    if (ann.type !== 'rect' || !ann.shape) return;
    if (hideDone && ann.status === 'done') return;
    const { rx, ry, rw, rh } = ann.shape;
    const x = rx * imageNaturalW * zoomLevel;
    const y = ry * imageNaturalH * zoomLevel;
    const w = rw * imageNaturalW * zoomLevel;
    const h = rh * imageNaturalH * zoomLevel;
    ctx.save();
    ctx.strokeStyle = ann.status === 'done' ? '#10b981' : ann.status === 'doing' ? '#f59e0b' : '#ef4444';
    ctx.lineWidth = 2.5;
    ctx.fillStyle = ctx.strokeStyle.replace(')', ', 0.07)').replace('rgb', 'rgba');
    ctx.fillStyle = ann.status === 'done' ? 'rgba(16,185,129,0.07)' :
                    ann.status === 'doing' ? 'rgba(245,158,11,0.07)' : 'rgba(239,68,68,0.07)';
    if (ann.id === selectedId) { ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = 6; }
    ctx.strokeRect(x, y, w, h);
    ctx.fillRect(x, y, w, h);
    ctx.restore();
  });
}

function renderSidebar() {
  const filtered = getFiltered();
  countBadge.textContent = `${filtered.length} 件`;
  commentList.innerHTML = '';
  if (filtered.length === 0) {
    commentList.innerHTML = '<p style="text-align:center;color:#aaa;padding:32px 16px;font-size:13px;">コメントはありません</p>';
    return;
  }
  filtered.forEach(ann => {
    const card = document.createElement('div');
    card.className = `comment-card status-${ann.status}${ann.id === selectedId ? ' selected' : ''}`;
    card.dataset.id = ann.id;
    const priorityLabel = { high: '高', mid: '中', low: '低' }[ann.priority] || ann.priority;
    const statusLabel   = { todo: '未対応', doing: '対応中', done: '完了' }[ann.status] || ann.status;
    card.innerHTML = `
      <div class="card-header">
        <div class="card-pin status-${ann.status}">${ann.number}</div>
        <div class="card-meta">
          <div class="card-title">${esc(ann.content || '(コメント未入力)')}</div>
          <div class="card-badges">
            <span class="badge badge-${ann.priority}">${priorityLabel}</span>
            <span class="badge badge-${ann.status}">${statusLabel}</span>
            ${ann.assignee ? `<span class="badge badge-assign">${esc(ann.assignee)}</span>` : ''}
          </div>
        </div>
      </div>
      ${ann.reference ? `<div class="card-body"><div class="card-field"><span class="card-field-label">参考：</span>${esc(ann.reference)}</div></div>` : ''}
      <div class="card-actions">
        <button onclick="openEdit(${ann.id})" title="編集">✏️ 編集</button>
        <select style="flex:1;font-size:12px;padding:4px 6px;border-radius:6px;border:1px solid #d5d5d3;" onchange="updateAnnotation(${ann.id},{status:this.value})">
          <option value="todo"  ${ann.status==='todo'  ? 'selected' : ''}>未対応</option>
          <option value="doing" ${ann.status==='doing' ? 'selected' : ''}>対応中</option>
          <option value="done"  ${ann.status==='done'  ? 'selected' : ''}>完了</option>
        </select>
        <button class="btn-danger" onclick="deleteAnnotation(${ann.id})" title="削除">🗑</button>
      </div>
    `;
    card.addEventListener('click', e => {
      if (e.target.tagName === 'BUTTON' || e.target.tagName === 'SELECT') return;
      selectAnnotation(ann.id);
    });
    commentList.appendChild(card);
  });
}

function getFiltered() {
  return annotations.filter(ann => {
    if (hideDone && ann.status === 'done') return false;
    if (currentFilter === 'all') return true;
    if (currentFilter === 'high') return ann.priority === 'high';
    return ann.status === currentFilter;
  });
}

// ─── Filter / Toggle ─────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSidebar();
}
function toggleDone() {
  hideDone = !hideDone;
  const btn = document.getElementById('btn-hide-done');
  btn.classList.toggle('active', hideDone);
  renderAll();
}

// ─── Persist ─────────────────────────────────────────────
function saveToStorage() {
  const data = { annotations, nextId, imageDataURL, imageName, imageNaturalW, imageNaturalH };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
}
function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    annotations = data.annotations || [];
    nextId = data.nextId || (annotations.length + 1);
    imageName = data.imageName || '';
    if (data.imageDataURL) {
      imageDataURL = data.imageDataURL;
      imageNaturalW = data.imageNaturalW;
      imageNaturalH = data.imageNaturalH;
      mainImage.onload = () => {
        resizeDrawLayer();
        placeholder.classList.add('hidden');
        canvasInner.style.display = 'inline-block';
        fitImage();
        renderAll();
      };
      mainImage.src = imageDataURL;
    }
  } catch (e) {}
}

// ─── Export / Import ─────────────────────────────────────
function exportJSON() {
  const data = { imageName, annotations, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (imageName ? imageName.replace(/\.[^.]+$/, '') : 'annotations') + '_comments.json';
  a.click(); URL.revokeObjectURL(a.href);
  toast('JSONを保存しました');
}
function importJSON(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data.annotations)) throw new Error('invalid');
      if (annotations.length > 0 && !confirm('現在のコメントを上書きしてインポートしますか？')) return;
      annotations = data.annotations;
      nextId = Math.max(...annotations.map(a => a.id), 0) + 1;
      renderAll(); saveToStorage();
      toast('インポートしました');
    } catch (e) { alert('JSONファイルの読み込みに失敗しました'); }
  };
  reader.readAsText(file);
}

// ─── PNG Export ──────────────────────────────────────────
function exportPNG() {
  if (!imageNaturalW) { alert('画像を開いてください'); return; }
  const canvas = document.createElement('canvas');
  canvas.width  = imageNaturalW;
  canvas.height = imageNaturalH;
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0);
    // Draw rect shapes
    annotations.forEach(ann => {
      if (ann.type !== 'rect' || !ann.shape) return;
      const { rx, ry, rw, rh } = ann.shape;
      ctx.save();
      ctx.strokeStyle = ann.status === 'done' ? '#10b981' : ann.status === 'doing' ? '#f59e0b' : '#ef4444';
      ctx.lineWidth = 3;
      ctx.strokeRect(rx * imageNaturalW, ry * imageNaturalH, rw * imageNaturalW, rh * imageNaturalH);
      ctx.restore();
    });
    // Draw pins
    annotations.forEach(ann => {
      const px = ann.x * imageNaturalW;
      const py = ann.y * imageNaturalH;
      const color = ann.status === 'done' ? '#10b981' : ann.status === 'doing' ? '#f59e0b' : '#ef4444';
      ctx.save();
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(px, py - 14, 14, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(ann.number), px, py - 14);
      ctx.restore();
    });
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = (imageName ? imageName.replace(/\.[^.]+$/, '') : 'image') + '_annotated.png';
    a.click();
    toast('PNG書き出し完了');
  };
  img.src = imageDataURL;
}

// ─── Helpers ─────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}
</script>
